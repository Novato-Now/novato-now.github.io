<!DOCTYPE html>
<html>
  <head>
    <script>
      const path = window.location.pathname;

      const sharedPostMatch = path.split("/SharedPost/");
      const profileMatch = path.split("/Profile/");

      if (sharedPostMatch[1]) {
        const postId = sharedPostMatch[1].split("/")[0];
        window.location.replace(
          `zoneup://SharedPost/${encodeURIComponent(postId)}`
        );
      } else if (profileMatch[1]) {
        const username = profileMatch[1].split("/")[0];
        window.location.replace(
          `zoneup://Profile/${encodeURIComponent(username)}`
        );
      } else {
        window.location.replace("https://zoneup.in");
      }
    </script>
  </head>
  <body></body>
</html>
