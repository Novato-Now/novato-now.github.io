<!DOCTYPE html>
<html>
  <head>
    <title>Open in ZoneUp App</title>
    <meta http-equiv="refresh" content="0;url=https://zoneup.in" />
    <script type="text/javascript">
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        let postId = urlParams.get("postId");
        let username = urlParams.get("username");

        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        const playStoreUrl =
          "https://play.google.com/store/apps/details?id=com.zoneup12345.zoneup";
        const appStoreUrl = "itms-apps://itunes.apple.com/app/id6744461293";

        if (postId) {
          postId = postId.split("/")[0].split("?")[0].split("#")[0];
          window.location.href = `zoneup://SharedPost/${postId}`;
        } else if (username) {
          username = username.split("/")[0].split("?")[0].split("#")[0];
          window.location.href = `zoneup://Profile/${username}`;
        } else {
          window.location.href = "https://zoneup.in";
          return;
        }

        setTimeout(function () {
          window.location.href = isAndroid
            ? playStoreUrl
            : isIOS
            ? appStoreUrl
            : "https://zoneup.in";
        }, 100);
      })();
    </script>
  </head>
  <body></body>
</html>
